name: Build Zanoza IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Install Homebrew deps
        run: brew install go xcodegen

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Init gomobile
        run: gomobile init

      - name: Install Pillow (for icon generation)
        run: python3 -m pip install --user --break-system-packages pillow

      - name: Build Go xcframework
        run: apple/Scripts/build-xcframework.sh

      - name: Generate Xcode project
        run: apple/Scripts/prepare-xcode.sh

      - name: Build unsigned IPA
        run: apple/Scripts/build-ios-unsigned-local-ipa.sh

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Zanoza-unsigned-ipa
          path: apple/.build/ios-unsigned-local/Zanoza-unsigned.ipa
